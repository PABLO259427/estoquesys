<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema PEP Corrigido</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">

<h1 class="text-xl font-bold mb-4">Tabela de Entradas</h1>

<table class="w-full bg-white rounded shadow">
<thead>
<tr>
<th class="p-3">FOTO</th>
<th class="p-3">BEG</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="imagePreviewModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center">
<img id="largeImagePreview" class="max-h-[80vh]">
</div>

<script>
function escapeHtml(text=''){
 return text.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
}

function getBegPhotoThumbHtml(entry){
 if(entry.photo && entry.photo.startsWith('data:image')){
  const code = escapeHtml(entry.begCode||'BEG');
  return `<img src="${entry.photo}" onclick="openImageModal(this.src)" 
  onerror="this.outerHTML='<div class=&quot;w-14 h-14 flex items-center justify-center border text-gray-400&quot;><i class=&quot;fas fa-camera&quot;></i></div>'"
  class="w-14 h-14 object-cover rounded mx-auto cursor-pointer">`;
 }
 return `<div class="w-14 h-14 flex items-center justify-center border text-gray-400 mx-auto"><i class="fas fa-camera"></i></div>`;
}

function openImageModal(src){
 if(!src || !src.startsWith('data:image')) return alert('Imagem inválida');
 const modal=document.getElementById('imagePreviewModal');
 const img=document.getElementById('largeImagePreview');
 img.src=src;
 modal.classList.remove('hidden');
 modal.classList.add('flex');
 modal.onclick=()=>modal.classList.add('hidden');
}

let data={sucata:{entries:[]}};

function add(file){
 const reader=new FileReader();
 reader.onload=e=>{
  data.sucata.entries.push({begCode:'BEG-01',photo:e.target.result});
  render();
 };
 reader.readAsDataURL(file);
}

function render(){
 const tb=document.getElementById('table');
 tb.innerHTML='';
 data.sucata.entries.forEach(e=>{
  tb.innerHTML+=`<tr>
  <td class="p-3 text-center">${getBegPhotoThumbHtml(e)}</td>
  <td class="p-3">${e.begCode}</td>
  </tr>`;
 });
}

document.body.insertAdjacentHTML('beforeend','<input type="file" onchange="add(this.files[0])">');

render();
</script>

</body>
</html>
