<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Estoque por PEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .tab-active { border-bottom: 2px solid #667eea; color: #667eea; font-weight: 600; }
        .pep-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #d1d5db; z-index: 50; max-height: 200px; overflow-y: auto; }
        .pep-dropdown-item { padding: 0.5rem 1rem; cursor: pointer; }
        .pep-dropdown-item:hover { background: #f3f4f6; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="glass-panel rounded-2xl p-6 mb-6 shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Controle de Estoque PEP</h1>
                        <p class="text-sm text-gray-600">Gestão de materiais por Projeto de Engenharia</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="glass-panel rounded-xl p-5 border-l-4 border-blue-500">
                <p class="text-sm text-gray-600">Total de Materiais</p>
                <h3 class="text-2xl font-bold" id="totalMaterialsCount">0</h3>
            </div>
            <div class="glass-panel rounded-xl p-5 border-l-4 border-orange-500">
                <p class="text-sm text-gray-600">Movimentações Registradas</p>
                <h3 class="text-2xl font-bold" id="totalMovementsCount">0</h3>
            </div>
        </div>

        <div class="glass-panel rounded-t-2xl overflow-hidden">
            <nav class="flex border-b border-gray-200 bg-gray-50/50">
                <button onclick="switchTab('materials')" id="tab-materials" class="px-6 py-4 text-sm tab-active">Materiais</button>
                <button onclick="switchTab('entry')" id="tab-entry" class="px-6 py-4 text-sm">Entrada</button>
                <button onclick="switchTab('exit')" id="tab-exit" class="px-6 py-4 text-sm">Saída PEP</button>
                <button onclick="switchTab('history')" id="tab-history" class="px-6 py-4 text-sm">Histórico</button>
            </nav>
        </div>

        <div class="glass-panel rounded-b-2xl p-6 shadow-xl min-height-[400px]">
            
            <div id="content-materials" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6 bg-blue-50 p-4 rounded-lg">
                    <input type="text" id="codeInput" placeholder="Código" class="p-2 border rounded">
                    <input type="text" id="descInput" placeholder="Descrição" class="p-2 border rounded">
                    <input type="text" id="unitInput" placeholder="Unidade (Ex: UN, M)" class="p-2 border rounded">
                    <button onclick="addMaterial()" class="bg-blue-600 text-white rounded p-2 hover:bg-blue-700">Cadastrar</button>
                </div>
                <table class="w-full text-left">
                    <thead><tr class="border-b">
                        <th class="p-2">Código</th><th class="p-2">Descrição</th><th class="p-2">Estoque</th><th class="p-2">Ação</th>
                    </tr></thead>
                    <tbody id="materialsTable"></tbody>
                </table>
            </div>

            <div id="content-entry" class="tab-content hidden">
                <h2 class="font-bold mb-4">Registrar Entrada de Material</h2>
                <div class="grid gap-4 max-w-md">
                    <select id="entryMaterialSelect" class="p-2 border rounded"></select>
                    <input type="number" id="entryQty" placeholder="Quantidade" class="p-2 border rounded">
                    <button onclick="registerEntry()" class="bg-green-600 text-white p-2 rounded">Confirmar Entrada</button>
                </div>
            </div>

            <div id="content-exit" class="tab-content hidden">
                <h2 class="font-bold mb-4">Saída por PEP</h2>
                <div class="grid gap-4 max-w-md">
                    <input type="text" id="exitPep" placeholder="Número do PEP" class="p-2 border rounded">
                    <select id="exitMaterialSelect" class="p-2 border rounded"></select>
                    <input type="number" id="exitQty" placeholder="Quantidade" class="p-2 border rounded">
                    <button onclick="registerExit()" class="bg-red-600 text-white p-2 rounded">Confirmar Saída</button>
                </div>
            </div>

            <div id="content-history" class="tab-content hidden">
                <table class="w-full text-left">
                    <thead><tr class="border-b">
                        <th class="p-2">Data</th><th class="p-2">Tipo</th><th class="p-2">Material</th><th class="p-2">Qtd</th><th class="p-2">Ação</th>
                    </tr></thead>
                    <tbody id="historyTable"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        // PERSISTÊNCIA
        let materials = JSON.parse(localStorage.getItem('materials_pep')) || [];
        let movements = JSON.parse(localStorage.getItem('movements_pep')) || [];

        function saveData() {
            localStorage.setItem('materials_pep', JSON.stringify(materials));
            localStorage.setItem('movements_pep', JSON.stringify(movements));
            updateDashboard();
        }

        // CADASTRO
        function addMaterial() {
            const code = document.getElementById('codeInput').value;
            const desc = document.getElementById('descInput').value;
            const unit = document.getElementById('unitInput').value || 'un';

            if (!code || !desc) return alert("Preencha Código e Descrição.");

            if (confirm(`Deseja cadastrar o material: ${desc}?`)) {
                materials.push({ code, description: desc, unit, stock: 0 });
                saveData();
                renderMaterials();
                document.getElementById('codeInput').value = '';
                document.getElementById('descInput').value = '';
            }
        }

        // EXCLUSÃO DE MATERIAL (LIXEIRA)
        function deleteMaterial(index) {
            const item = materials[index];
            if (confirm(`⚠️ EXCLUIR MATERIAL: ${item.description}?\nIsso removerá o item do sistema permanentemente.`)) {
                materials.splice(index, 1);
                saveData();
                renderMaterials();
            }
        }

        // MOVIMENTAÇÕES
        function registerEntry() {
            const idx = document.getElementById('entryMaterialSelect').value;
            const qty = parseFloat(document.getElementById('entryQty').value);
            if (!qty || qty <= 0) return alert("Quantidade inválida.");

            if (confirm(`Confirmar ENTRADA de ${qty} unidades para ${materials[idx].description}?`)) {
                materials[idx].stock += qty;
                movements.push({
                    date: new Date().toLocaleString(),
                    type: 'ENTRADA',
                    material: materials[idx].description,
                    qty: qty
                });
                saveData();
                alert("Entrada registrada!");
                switchTab('materials');
            }
        }

        function registerExit() {
            const idx = document.getElementById('exitMaterialSelect').value;
            const qty = parseFloat(document.getElementById('exitQty').value);
            const pep = document.getElementById('exitPep').value;

            if (!qty || qty <= 0 || !pep) return alert("Preencha todos os campos.");
            if (materials[idx].stock < qty) return alert("❌ Estoque insuficiente!");

            if (confirm(`Confirmar SAÍDA de ${qty} unidades para o PEP ${pep}?`)) {
                materials[idx].stock -= qty;
                movements.push({
                    date: new Date().toLocaleString(),
                    type: 'SAÍDA',
                    material: `${materials[idx].description} (PEP: ${pep})`,
                    qty: qty
                });
                saveData();
                alert("Saída registrada!");
                switchTab('materials');
            }
        }

        // EXCLUSÃO DE HISTÓRICO (LIXEIRA)
        function deleteHistory(index) {
            if (confirm("Deseja remover este registro do histórico? (Isso não altera o estoque atual)")) {
                movements.splice(index, 1);
                saveData();
                renderHistory();
            }
        }

        // INTERFACE
        function renderMaterials() {
            const table = document.getElementById('materialsTable');
            const selectEntry = document.getElementById('entryMaterialSelect');
            const selectExit = document.getElementById('exitMaterialSelect');
            
            table.innerHTML = materials.map((m, i) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2">${m.code}</td>
                    <td class="p-2">${m.description}</td>
                    <td class="p-2 font-bold">${m.stock} ${m.unit}</td>
                    <td class="p-2">
                        <button onclick="deleteMaterial(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');

            const options = materials.map((m, i) => `<option value="${i}">${m.description} (${m.code})</option>`).join('');
            selectEntry.innerHTML = options;
            selectExit.innerHTML = options;
        }

        function renderHistory() {
            const table = document.getElementById('historyTable');
            table.innerHTML = movements.map((mov, i) => `
                <tr class="border-b text-sm">
                    <td class="p-2 text-gray-500">${mov.date}</td>
                    <td class="p-2 font-bold ${mov.type === 'ENTRADA' ? 'text-green-600' : 'text-red-600'}">${mov.type}</td>
                    <td class="p-2">${mov.material}</td>
                    <td class="p-2">${mov.qty}</td>
                    <td class="p-2">
                        <button onclick="deleteHistory(${i})" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).reverse().join('');
        }

        function updateDashboard() {
            document.getElementById('totalMaterialsCount').innerText = materials.length;
            document.getElementById('totalMovementsCount').innerText = movements.length;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            if (tab === 'history') renderHistory();
            if (tab === 'materials') renderMaterials();
        }

        window.onload = () => { renderMaterials(); updateDashboard(); };
    </script>
</body>
</html>
