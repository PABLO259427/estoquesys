<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <!-- ... todo o seu sidebar original aqui ... -->
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div id="alertContainer"></div>

            <!-- DASHBOARD -->
            <section id="dashboard" class="section active">
                <!-- ... todo o conteúdo do dashboard ... -->

                <!-- Botões de debug temporários (pode remover depois que testar) -->
                <div style="margin: 20px; text-align: center;">
                    <button onclick="console.log('Dados atuais:', dados); alert('Veja console F12 para ver dados')" class="btn btn-secondary">
                        Ver dados no console
                    </button>
                    <button onclick="salvarDados(true); alert('Forçado salvamento')" class="btn btn-primary">
                        Forçar salvamento agora
                    </button>
                    <button onclick="if(confirm('Limpar tudo?')){localStorage.removeItem('EstoqueSysDados_v3');location.reload();}" class="btn btn-danger">
                        Limpar dados salvos
                    </button>
                </div>
            </section>

            <!-- ... todas as outras sections (materiais, peps, entrada-fornecedor, etc.) permanecem iguais ... -->
        </main>
    </div>

    <!-- Modal de Detalhes -->
    <div id="modalMovimentacao" class="modal">
        <!-- ... seu modal original ... -->
    </div>

    <script>
        // ==========================================
        // DADOS DO SISTEMA
        // ==========================================
        let dados = {
            materiais: [],
            peps: [],
            movimentacoes: [],
            entradasFornecedor: [],
            entradasDevolucao: [],
            saidas: []
        };

        let tempItens = { fornecedor: [], devolucao: [], saida: [] };
        let movimentacaoAtual = null;

        // PERSISTÊNCIA - CHAVE NOVA PARA RESETAR
        const STORAGE_KEY = 'EstoqueSysDados_v3';

        function carregarDadosSalvos() {
            const salvo = localStorage.getItem(STORAGE_KEY);
            if (salvo) {
                try {
                    dados = JSON.parse(salvo);
                    console.log('Dados carregados:', dados.materiais.length, 'materiais');
                } catch (e) {
                    console.error('Erro ao carregar:', e);
                    localStorage.removeItem(STORAGE_KEY);
                    showAlert('Dados antigos corrompidos. Iniciando novo.', 'warning');
                }
            }
        }

        function salvarDados(debug = false) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
                if (debug) console.log('Salvamento forçado OK');
            } catch (e) {
                console.error('Erro salvamento:', e);
                showAlert('Falha ao salvar (veja console F12)', 'danger');
            }
        }

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            carregarDadosSalvos();  // Carrega primeiro!

            const agora = new Date();
            const dataLocal = agora.toISOString().slice(0, 16);
            ['entFornData', 'entDevData', 'saidaData'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = dataLocal;
            });

            document.getElementById('currentDate').textContent = agora.toLocaleDateString('pt-BR', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            atualizarTudo();
        });

        // ==========================================
        // SUAS FUNÇÕES (exemplo corrigido - adicione salvarDados() em todas que alteram dados)
        // ==========================================

        function salvarMaterial(event) {
            event.preventDefault();
            
            const codigo = document.getElementById('matCodigo').value.trim().toUpperCase();
            if (!codigo) return showAlert('Código obrigatório!', 'warning');
            if (dados.materiais.some(m => m.codigo === codigo)) {
                return showAlert('Código já existe!', 'danger');
            }

            const material = {
                id: Date.now(),
                codigo,
                descricao: document.getElementById('matDescricao').value.trim(),
                unidade: document.getElementById('matUnidade').value,
                saldo: parseFloat(document.getElementById('matSaldo').value) || 0,
                custo: parseFloat(document.getElementById('matCusto').value) || 0,
                localizacao: document.getElementById('matLocalizacao').value.trim()
            };

            dados.materiais.push(material);
            atualizarListaMateriais();
            atualizarEstoque();
            atualizarDashboard();
            salvarDados();  // ← SALVA AQUI
            document.getElementById('formMaterial').reset();
            showAlert('Material salvo!', 'success');
        }

        function excluirMaterial(id) {
            if (!confirm('Excluir permanentemente?')) return;
            dados.materiais = dados.materiais.filter(m => m.id !== id);
            atualizarListaMateriais();
            atualizarEstoque();
            atualizarDashboard();
            salvarDados();  // ← SALVA AQUI
            showAlert('Material excluído!');
        }

        // REPITA O PADRÃO EM TODAS AS OUTRAS FUNÇÕES:
        // - salvarPEP()
        // - excluirPEP()
        // - salvarEntradaFornecedor()
        // - excluirEntradaFornecedor()
        // - salvarEntradaDevolucao()
        // - excluirEntradaDevolucao()
        // - salvarSaidaPEP()
        // - excluirSaida()
        // Sempre colocar salvarDados() após as atualizações de tela

        // ... o resto do seu script original continua aqui (showSection, showAlert, atualizarDashboard, etc.) ...

        // Exemplo para salvarEntradaFornecedor (adicione salvarDados() no final):
        function salvarEntradaFornecedor(event) {
            event.preventDefault();
            // ... todo o seu código de validação, criação de entrada, atualização de saldos ...
            dados.entradasFornecedor.push(entrada);
            dados.movimentacoes.push(entrada);
            tempItens.fornecedor = [];
            atualizarListaTempItens('fornecedor');
            atualizarEntradasFornecedor();
            atualizarDashboard();
            atualizarEstoque();
            salvarDados();  // ← OBRIGATÓRIO AQUI
            document.getElementById('formEntradaFornecedor').reset();
            showAlert('Entrada salva!');
        }

        // Faça o mesmo nas demais funções de movimentação e exclusão
    </script>
</body>
</html>
