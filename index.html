    <script>
        // ============================================================
        // DADOS COM PERSISTÊNCIA (CHAVE NOVA v3)
        // ============================================================
        let data = {
            materials: [],
            movements: [],
            pepAllocations: {}
        };

        const STORAGE_KEY = 'pepStockData_v3';   // chave nova para resetar

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    data = JSON.parse(saved);
                    console.log('✅ Dados carregados do localStorage:', data.materials.length, 'materiais');
                } catch (e) {
                    console.error('Erro ao carregar:', e);
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                console.log('✅ Dados salvos com sucesso!');
            } catch (e) {
                console.error('Erro ao salvar:', e);
                alert('Erro ao salvar dados. Veja o console (F12).');
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            loadData();               // carrega primeiro
            updateAllViews();
            setupEventListeners();

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('exitDateNeeded').value = today;
        });
