<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Estoque - Pablo Duarte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .tab-active { border-bottom: 3px solid #667eea; color: #667eea; font-weight: 700; }
        .hidden { display: none; }
        
        .animate-slide-in { 
            animation: slideIn 0.3s ease-out; 
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body class="p-4 md:p-8">
    
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>

    <div class="max-w-7xl mx-auto">
        <div class="glass-panel rounded-2xl p-6 mb-6 shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-boxes-stacked"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Pablo Leandro Duarte</h1>
                        <p class="text-sm text-gray-600 font-medium">Gestão de Materiais | Redes 15kV</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="exportBackup()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-semibold hover:bg-gray-50 transition-all">Exportar JSON</button>
                    <button onclick="generateTxtReport()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 shadow-md transition-all">Relatório Geral (.txt)</button>
                </div>
            </div>
        </div>

        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden min-h-[650px]">
            <div class="border-b border-gray-200 bg-gray-50/50">
                <nav class="flex overflow-x-auto">
                    <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-btn px-8 py-5 text-sm tab-active uppercase tracking-wider">Dashboard</button>
                    <button onclick="switchTab('materials')" id="tab-materials" class="tab-btn px-8 py-5 text-sm uppercase tracking-wider">Estoque Geral</button>
                    <button onclick="switchTab('exit')" id="tab-exit" class="tab-btn px-8 py-5 text-sm uppercase tracking-wider text-rose-600 font-bold">Saída PEP</button>
                    <button onclick="switchTab('history')" id="tab-history" class="tab-btn px-8 py-5 text-sm uppercase tracking-wider">Histórico</button>
                </nav>
            </div>

            <div id="content-dashboard" class="tab-content dark-glass text-white p-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-slate-800/60 p-6 rounded-2xl border border-slate-700 shadow-inner">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Tipos de Itens</p>
                        <h3 class="text-4xl font-light mt-2" id="dash-items">0</h3>
                    </div>
                    <div class="bg-slate-800/60 p-6 rounded-2xl border border-emerald-500/20 shadow-inner">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Valor em Estoque</p>
                        <h3 class="text-4xl font-light mt-2 text-emerald-400" id="dash-value">R$ 0,00</h3>
                    </div>
                    <div class="bg-slate-800/60 p-6 rounded-2xl border border-blue-500/20 shadow-inner">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Obras (PEPs) Ativas</p>
                        <h3 class="text-4xl font-light mt-2 text-blue-400" id="dash-peps">0</h3>
                    </div>
                </div>
                <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                    <h3 class="text-sm font-bold mb-4 text-rose-400 uppercase tracking-widest"><i class="fas fa-exclamation-triangle mr-2"></i>Atenção: Estoque Baixo</h3>
                    <div id="alertsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </div>

            <div id="content-materials" class="tab-content hidden p-8 animate-slide-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Catálogo de Materiais</h2>
                    <button onclick="openModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-all">+ Novo Item</button>
                </div>
                <div class="overflow-x-auto rounded-xl border border-gray-100">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-xs uppercase font-bold">
                                <th class="p-4">Código</th>
                                <th class="p-4">Descrição</th>
                                <th class="p-4">Saldo Atual</th>
                                <th class="p-4">Unid.</th>
                                <th class="p-4 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="materialsTable" class="text-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <div id="content-exit" class="tab-content hidden p-8 animate-slide-in">
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-4">Registrar Saída para Obra</h2>
                    <form id="exitForm" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Número do PEP</label>
                                <input type="text" id="exitPep" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl focus:border-indigo-500 outline-none transition-all" placeholder="PEP-0000-00" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Solicitante / Equipe</label>
                                <input type="text" id="exitUser" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl focus:border-indigo-500 outline-none transition-all" placeholder="Nome do responsável">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Material</label>
                            <select id="exitMaterialSelect" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl focus:border-indigo-500 outline-none transition-all" required></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Quantidade de Saída</label>
                            <input type="number" id="exitQty" step="0.01" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl focus:border-indigo-500 outline-none transition-all" placeholder="0.00" required>
                        </div>
                        <button type="submit" class="w-full bg-rose-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-rose-700 shadow-lg transition-all mt-4">CONFIRMAR MOVIMENTAÇÃO</button>
                    </form>
                </div>
            </div>

            <div id="content-history" class="tab-content hidden p-8 animate-slide-in">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Log de Atividades</h2>
                <div id="historyLog" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="matModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[110] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-gray-800">Adicionar ao Almoxarifado</h2>
            <form id="matForm" class="space-y-4">
                <input type="text" id="matCode" placeholder="Código do Material" class="w-full bg-gray-50 border p-3 rounded-xl" required>
                <input type="text" id="matName" placeholder="Descrição (Ex: Isolador, Cabo...)" class="w-full bg-gray-50 border p-3 rounded-xl" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="matPrice" placeholder="Preço Un." step="0.01" class="bg-gray-50 border p-3 rounded-xl">
                    <input type="text" id="matUnit" placeholder="Unid (UN/M)" class="bg-gray-50 border p-3 rounded-xl">
                </div>
                <input type="number" id="matStock" placeholder="Estoque Inicial" step="0.01" class="w-full bg-gray-50 border p-3 rounded-xl" required>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-gray-600">Cancelar</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">Salvar Item</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // LÓGICA DO SISTEMA PABLO DUARTE
        let db = JSON.parse(localStorage.getItem('pablo_logistica_v1')) || {
            materials: [],
            movements: [],
            peps: {}
        };

        // Início
        window.onload = () => {
            refreshUI();
        };

        function saveData() {
            localStorage.setItem('pablo_logistica_v1', JSON.stringify(db));
            refreshUI();
        }

        function refreshUI() {
            renderMaterials();
            updateDashboard();
            renderHistory();
            populateSelect();
        }

        // Navegação
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');
        }

        // Modal
        function openModal() { document.getElementById('matModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('matModal').classList.add('hidden'); }

        // Gestão de Materiais
        document.getElementById('matForm').onsubmit = (e) => {
            e.preventDefault();
            const material = {
                id: document.getElementById('matCode').value,
                name: document.getElementById('matName').value,
                price: parseFloat(document.getElementById('matPrice').value) || 0,
                unit: document.getElementById('matUnit').value || 'UN',
                stock: parseFloat(document.getElementById('matStock').value)
            };
            db.materials.push(material);
            saveData();
            closeModal();
            e.target.reset();
            showToast("Material adicionado com sucesso!", "success");
        };

        function renderMaterials() {
            const tbody = document.getElementById('materialsTable');
            tbody.innerHTML = db.materials.map(m => `
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                    <td class="p-4 font-mono text-sm text-indigo-600">${m.id}</td>
                    <td class="p-4 font-semibold">${m.name}</td>
                    <td class="p-4 font-bold ${m.stock < 10 ? 'text-rose-500' : 'text-gray-800'}">${m.stock}</td>
                    <td class="p-4 text-gray-400 text-xs">${m.unit}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteMaterial('${m.id}')" class="text-gray-300 hover:text-rose-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteMaterial(id) {
            if(confirm("Deseja remover este item do catálogo?")) {
                db.materials = db.materials.filter(m => m.id !== id);
                saveData();
            }
        }

        // Saída PEP
        function populateSelect() {
            const select = document.getElementById('exitMaterialSelect');
            select.innerHTML = '<option value="">Escolha o material...</option>' + 
                db.materials.map(m => `<option value="${m.id}">${m.name} (Saldo: ${m.stock})</option>`).join('');
        }

        document.getElementById('exitForm').onsubmit = (e) => {
            e.preventDefault();
            const pep = document.getElementById('exitPep').value.toUpperCase();
            const matId = document.getElementById('exitMaterialSelect').value;
            const qty = parseFloat(document.getElementById('exitQty').value);
            const user = document.getElementById('exitUser').value || 'Não informado';

            const material = db.materials.find(m => m.id === matId);

            if (!material || material.stock < qty) {
                showToast("Erro: Saldo insuficiente em estoque!", "error");
                return;
            }

            material.stock -= qty;
            const mov = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                pep: pep,
                matName: material.name,
                qty: qty,
                user: user
            };

            db.movements.unshift(mov);
            if(!db.peps[pep]) db.peps[pep] = [];
            db.peps[pep].push(mov);

            saveData();
            e.target.reset();
            showToast(`Saída registrada para ${pep}`, "success");
        };

        // Dashboard e Histórico
        function updateDashboard() {
            const totalVal = db.materials.reduce((acc, cur) => acc + (cur.stock * cur.price), 0);
            document.getElementById('dash-items').innerText = db.materials.length;
            document.getElementById('dash-value').innerText = `R$ ${totalVal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('dash-peps').innerText = Object.keys(db.peps).length;

            const alerts = db.materials.filter(m => m.stock < 10);
            document.getElementById('alertsContainer').innerHTML = alerts.map(a => `
                <div class="bg-rose-500/10 border border-rose-500/20 p-3 rounded-xl flex justify-between items-center animate-pulse">
                    <span class="text-sm font-medium text-rose-200">${a.name}</span>
                    <span class="bg-rose-500 text-white px-2 py-1 rounded-md text-xs font-bold">SALDO: ${a.stock}</span>
                </div>
            `).join('') || '<p class="text-xs text-slate-500">Nenhum alerta crítico no momento.</p>';
        }

        function renderHistory() {
            document.getElementById('historyLog').innerHTML = db.movements.map(m => `
                <div class="bg-white border-l-4 border-rose-500 p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase">${m.date} - PEP: ${m.pep}</p>
                        <p class="text-gray-800 font-semibold">${m.qty} unidades de ${m.matName}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500 italic">Equipe: ${m.user}</span>
                    </div>
                </div>
            `).join('');
        }

        // Exportação de Dados
        function generateTxtReport() {
            let txt = `BALANÇO FÍSICO GERAL - PABLO DUARTE\nData: ${new Date().toLocaleString()}\n\n`;
            txt += `MOVIMENTAÇÕES POR PROJETO (PEP):\n`;
            for(let pep in db.peps) {
                txt += `\n>> OBRA: ${pep}\n`;
                db.peps[pep].forEach(m => {
                    txt += `   - ${m.date}: ${m.qty} un de ${m.matName} (Resp: ${m.user})\n`;
                });
            }
            txt += `\n\nRESUMO DE ESTOQUE ATUAL:\n`;
            db.materials.forEach(m => {
                txt += `${m.id.padEnd(10)} | ${m.name.padEnd(25)} | Saldo: ${m.stock} ${m.unit}\n`;
            });

            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Relatorio_Estoque_Pablo.txt`;
            a.click();
        }

        function exportBackup() {
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const a = document.createElement('a');
            a.setAttribute("href", data);
            a.setAttribute("download", "backup_sistema_pablo.json");
            a.click();
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-2xl shadow-2xl text-white font-bold animate-slide-in flex items-center gap-3 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
