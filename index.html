        let dados = {
            materiais: [],
            peps: [],
            movimentacoes: [],
            entradasFornecedor: [],
            entradasDevolucao: [],
            saidas: []
        };

        let tempItens = { fornecedor: [], devolucao: [], saida: [] };
        let movimentacaoAtual = null;

        const STORAGE_KEY = 'EstoqueSysDados_v3';

        function carregarDadosSalvos() {
            const salvo = localStorage.getItem(STORAGE_KEY);
            if (salvo) {
                try {
                    dados = JSON.parse(salvo);
                    console.log('Carregados', dados.materiais.length, 'materiais');
                } catch (e) {
                    console.error('Erro carregar:', e);
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
        }

        function salvarDados(debug = false) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
                if (debug) console.log('Salvo OK');
            } catch (e) {
                console.error('Erro salvar:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            carregarDadosSalvos();

            const agora = new Date();
            const dataLocal = agora.toISOString().slice(0, 16);
            ['entFornData', 'entDevData', 'saidaData'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = dataLocal;
            });

            document.getElementById('currentDate').textContent = agora.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            atualizarTudo();
        });
