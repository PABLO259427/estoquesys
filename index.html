<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de PEP — Sistema de Estoque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body { background: #0f172a; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.97); backdrop-filter: blur(12px); }
        .sidetab { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: 10px; cursor: pointer; color: #94a3b8; font-size: 13.5px; font-weight: 500; transition: all .18s; border: 1px solid transparent; }
        .sidetab:hover { background: rgba(99,102,241,.08); color: #c7d2fe; }
        .sidetab.active { background: rgba(99,102,241,.15); color: #818cf8; border-color: rgba(99,102,241,.25); font-weight: 600; }
        .pep-card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 18px 20px; transition: all .2s; cursor: pointer; }
        .pep-card:hover { border-color: #6366f1; box-shadow: 0 0 0 1px #6366f122, 0 8px 24px rgba(0,0,0,.4); transform: translateY(-1px); }
        .pep-card.selected { border-color: #818cf8; box-shadow: 0 0 0 2px #6366f133; }
        .prog-bar { height: 6px; border-radius: 99px; background: #1e293b; overflow: hidden; }
        .prog-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
        .modal-bg { position:fixed; inset:0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; padding: 16px; }
        .modal-box { background: #1e293b; border: 1px solid #334155; border-radius: 18px; padding: 28px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; }
        .inp { width: 100%; padding: 9px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 9px; color: #e2e8f0; font-size: 13.5px; outline: none; transition: border .15s; }
        .inp:focus { border-color: #6366f1; }
        label.lbl { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; border: none; outline: none; }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-ghost { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    </style>
</head>
<body>

<div id="modalPep" class="modal-bg hidden">
    <div class="modal-box">
        <h3 class="text-white font-bold text-lg mb-6" id="modalPepTitle">Nova PEP</h3>
        <form id="formPep" onsubmit="savePep(event)" class="space-y-4">
            <input type="hidden" id="pepId">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="lbl">Código PEP *</label><input type="text" id="pepCode" class="inp mono" required></div>
                <div><label class="lbl">Responsável</label><input type="text" id="pepResp" class="inp"></div>
            </div>
            <div><label class="lbl">E-mail para Notificação</label><input type="email" id="pepEmailGestor" class="inp" placeholder="gestor@exemplo.com"></div>
            <div><label class="lbl">Descrição *</label><input type="text" id="pepDesc" class="inp" required></div>
            
            <div class="flex gap-3 pt-4">
                <button type="button" class="btn btn-ghost flex-1" onclick="closeModal('modalPep')">Cancelar</button>
                <button type="submit" class="btn btn-primary flex-1">Salvar PEP</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Configurações e Estado
    let pepData = { projects: [] };
    const PEP_KEY = 'pepGestaoData';

    function savePep(e) {
        e.preventDefault();
        const id = document.getElementById('pepId').value;
        const code = document.getElementById('pepCode').value.trim();
        
        let pep = id ? pepData.projects.find(p => p.id === id) : { id: 'pep_' + Date.now(), materiais: [], historicoStatus: [] };
        
        pep.code = code;
        pep.responsavel = document.getElementById('pepResp').value;
        pep.emailGestor = document.getElementById('pepEmailGestor').value; // Salvando o e-mail
        pep.description = document.getElementById('pepDesc').value;
        
        if (!id) pepData.projects.push(pep);
        
        localStorage.setItem(PEP_KEY, JSON.stringify(pepData));
        closeModal('modalPep');
        alert('PEP salva com sucesso!');
    }

    function avancarStatus() {
        const pep = pepData.projects.find(p => p.id === selectedPepId);
        if (!pep) return;

        // Lógica de status simplificada
        if (pep.status === 'em_campo') {
            pep.status = 'concluido';
            enviarEmailConclusao(pep); // Dispara a automação
        }
        
        localStorage.setItem(PEP_KEY, JSON.stringify(pepData));
    }

    function enviarEmailConclusao(pep) {
        const destino = pep.emailGestor || 'gestao@exemplo.com';
        const assunto = encodeURIComponent(`Projeto Concluído: ${pep.code}`);
        const corpo = encodeURIComponent(`Prezado Gestor,\n\nO projeto "${pep.description}" (${pep.code}) foi concluído.\nResponsável: ${pep.responsavel}\n\nAtenciosamente,\nSistema de Gestão.`);
        
        window.location.href = `mailto:${destino}?subject=${assunto}&body=${corpo}`;
    }

    function openEditPepModal() {
        // Lógica para preencher o campo de e-mail ao editar
        const pep = pepData.projects.find(p => p.id === selectedPepId);
        document.getElementById('pepEmailGestor').value = pep.emailGestor || '';
        // ... restante da lógica de preenchimento ...
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
</script>
</body>
</html>
