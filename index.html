<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Estoque por PEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
       
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
       
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
       
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
       
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
       
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-success { background-color: #10b981; }
        .status-warning { background-color: #f59e0b; }
        .status-danger { background-color: #ef4444; }
       
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
       
        .tab-active { border-bottom: 2px solid #667eea; color: #667eea; font-weight: 600; }
       
        .pep-search-wrapper { position: relative; }
        .pep-search-wrapper input { padding-left: 2.5rem; }
        .pep-search-wrapper .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
        .pep-search-wrapper .clear-btn { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: #9ca3af; cursor: pointer; background: none; border: none; padding: 0; font-size: 0.8rem; }
        .pep-search-wrapper .clear-btn:hover { color: #6b7280; }
        .pep-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid #d1d5db; border-top: none; border-radius: 0 0 0.5rem 0.5rem; max-height: 200px; overflow-y: auto; z-index: 50; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .pep-dropdown-item { padding: 0.5rem 1rem; cursor: pointer; font-size: 0.875rem; color: #374151; transition: background 0.15s; }
        .pep-dropdown-item:hover { background: #f3f4f6; }
        .pep-dropdown-item.selected { background: #ede9fe; color: #7c3aed; font-weight: 500; }
        .pep-dropdown-empty { padding: 0.5rem 1rem; font-size: 0.875rem; color: #9ca3af; font-style: italic; }
       
        .image-preview { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 2px solid #e5e7eb; cursor: zoom-in; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="glass-panel rounded-2xl p-6 mb-6 shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Controle de Estoque PEP</h1>
                        <p class="text-sm text-gray-600">Gestão de materiais por Projeto de Engenharia</p>
                    </div>
                </div>
                <div class="flex gap-3 flex-wrap justify-center">
                    <button onclick="exportData()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition flex items-center gap-2 text-sm font-medium text-gray-700">
                        <i class="fas fa-download"></i> JSON
                    </button>
                    <button onclick="exportToWord()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2 text-sm font-medium">
                        <i class="fas fa-file-word"></i> Relatório
                    </button>
                    <button onclick="document.getElementById('importFile').click()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition flex items-center gap-2 text-sm font-medium text-gray-700">
                        <i class="fas fa-upload"></i> Importar
                    </button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(this)">
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="glass-panel rounded-2xl shadow-xl overflow-hidden">
            <!-- Navigation Tabs (100% original) -->
            <div class="border-b border-gray-200 bg-gray-50/50">
                <nav class="flex overflow-x-auto custom-scrollbar">
                    <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap tab-active">
                        <i class="fas fa-chart-pie mr-2"></i>Dashboard
                    </button>
                    <button onclick="switchTab('materials')" id="tab-materials" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap">
                        <i class="fas fa-box mr-2"></i>Cadastro de Materiais
                    </button>
                    <button onclick="switchTab('entry')" id="tab-entry" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap">
                        <i class="fas fa-arrow-down mr-2"></i>Entrada
                    </button>
                    <button onclick="switchTab('exit')" id="tab-exit" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap">
                        <i class="fas fa-arrow-up mr-2"></i>Saída por PEP
                    </button>
                    <button onclick="switchTab('return')" id="tab-return" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap">
                        <i class="fas fa-undo mr-2"></i>Devolução PEP
                    </button>
                    <button onclick="switchTab('stock')" id="tab-stock" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap">
                        <i class="fas fa-warehouse mr-2"></i>Posição de Estoque
                    </button>
                    <button onclick="switchTab('history')" id="tab-history" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap">
                        <i class="fas fa-history mr-2"></i>Histórico
                    </button>
                    <button onclick="switchTab('historypep')" id="tab-historypep" class="tab-btn px-6 py-4 text-sm font-medium text-gray-600 hover:text-gray-800 transition whitespace-nowrap">
                        <i class="fas fa-folder-open mr-2"></i>Histórico por PEP
                    </button>
                </nav>
            </div>

            <!-- Tab Contents -->
            <div class="p-6">
                <!-- Suas abas originais (dashboard, materials, entry, exit, return, stock, history, historypep) -->
                <!-- Cole aqui o conteúdo original das suas divs id="content-..." se quiser manter 100% fiel. -->

                <!-- Sucata Tab - Atualizada com Trafo, Poste de Madeira e Foto -->
                <div id="content-sucata" class="tab-content hidden animate-fade-in">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">Relatório de Sucata - Transformadores e Postes de Madeira</h2>
                    
                    <form id="sucataEntryForm" class="space-y-5 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Código do BEG</label>
                                <input type="text" id="sucataBegCode" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Tipo de Sucata</label>
                                <select id="sucataTipo" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" onchange="toggleSucataTipo()">
                                    <option value="comum">Material Comum</option>
                                    <option value="trafo">Transformador</option>
                                    <option value="poste">Poste de Madeira</option>
                                </select>
                            </div>
                        </div>

                        <div id="sucataMaterialField">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Material</label>
                            <div class="pep-search-wrapper">
                                <i class="fas fa-search search-icon"></i>
                                <input type="text" id="sucataMaterialSearch" class="w-full pl-10 pr-8 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Pesquisar material..." oninput="filterSucataMaterialDropdown()" onfocus="showSucataMaterialDropdown()" autocomplete="off">
                                <button type="button" class="clear-btn" onclick="clearSucataMaterialSearch()"><i class="fas fa-times"></i></button>
                                <div id="sucataMaterialDropdown" class="pep-dropdown hidden"></div>
                            </div>
                            <input type="hidden" id="sucataMaterialId">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Peso (KG)</label>
                                <input type="number" id="sucataWeightKg" step="0.01" min="0.01" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Foto do Item (BEG / Trafo / Poste)</label>
                                <input type="file" id="sucataPhoto" accept="image/*" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg" onchange="previewSucataPhoto(this)">
                                <input type="hidden" id="sucataPhotoBase64">
                                <img id="sucataPhotoPreview" class="mt-3 max-h-24 rounded-lg border hidden">
                            </div>
                        </div>

                        <button type="submit" class="w-full py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 transition font-bold flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> Registrar Entrada de Sucata
                        </button>
                    </form>

                    <!-- Tabela de Entradas com Fotos -->
                    <div class="mt-10">
                        <h3 class="text-lg font-bold mb-4">Entradas Registradas</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse bg-white rounded-xl overflow-hidden">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="p-4 text-left">Data</th>
                                        <th class="p-4 text-left">BEG / Item</th>
                                        <th class="p-4 text-left">Tipo</th>
                                        <th class="p-4 text-left">Foto</th>
                                        <th class="p-4 text-right">Peso (KG)</th>
                                        <th class="p-4 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="sucataEntriesTable" class="divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // DADOS + LOCALSTORAGE
        // =============================================
        let data = {
            materials: [],
            movements: [],
            pepAllocations: {},
            sucata: { entries: [] }
        };

        const STORAGE_KEY = 'pepStockData_v3';

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    data = JSON.parse(saved);
                } catch (e) {
                    console.error('Erro ao carregar dados:', e);
                }
            }
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error('Erro ao salvar:', e);
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            updateAllViews();
        });

        function updateAllViews() {
            // Mantenha suas funções originais de atualização aqui
            updateDashboard();
            updateMaterialsTable();
            updateStockTable();
            updateHistoryTable();
            updateSucataEntriesTable();
        }

        // =============================================
        // SUCATA - COM TRAFO, POSTE E FOTO
        // =============================================
        function toggleSucataTipo() {
            // Pode adicionar lógica específica para trafo ou poste aqui no futuro
        }

        function previewSucataPhoto(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('sucataPhotoBase64').value = e.target.result;
                const preview = document.getElementById('sucataPhotoPreview');
                preview.src = e.target.result;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('sucataEntryForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const begCode = document.getElementById('sucataBegCode').value.trim();
            const tipo = document.getElementById('sucataTipo').value;
            const weightKg = parseFloat(document.getElementById('sucataWeightKg').value);
            const photo = document.getElementById('sucataPhotoBase64').value;

            let descricao = '';
            if (tipo === 'trafo') descricao = 'Transformador';
            else if (tipo === 'poste') descricao = 'Poste de Madeira';
            else descricao = 'Material Comum';

            if (!data.sucata.entries) data.sucata.entries = [];

            data.sucata.entries.push({
                id: 'suc_' + Date.now(),
                begCode: begCode,
                tipo: tipo,
                descricao: descricao,
                weightKg: weightKg,
                photo: photo || null,
                date: new Date().toISOString()
            });

            saveData();
            updateSucataEntriesTable();
            this.reset();
            document.getElementById('sucataPhotoPreview').classList.add('hidden');
            alert('Entrada de sucata registrada com sucesso!');
        });

        function updateSucataEntriesTable() {
            const tbody = document.getElementById('sucataEntriesTable');
            tbody.innerHTML = '';

            data.sucata.entries.forEach(entry => {
                const photoHtml = entry.photo 
                    ? `<img src="${entry.photo}" class="image-preview" onclick="openImageModal('${entry.photo}', '${entry.begCode}')">` 
                    : '<span class="text-gray-400 text-xs">Sem foto</span>';

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4">${new Date(entry.date).toLocaleString('pt-BR')}</td>
                        <td class="p-4 font-mono">${entry.begCode}</td>
                        <td class="p-4">${entry.descricao}</td>
                        <td class="p-4">${photoHtml}</td>
                        <td class="p-4 text-right font-bold">${entry.weightKg.toFixed(2)} KG</td>
                        <td class="p-4 text-center">
                            <button onclick="deleteSucataEntry('${entry.id}')" class="text-red-500 hover:text-red-700">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>`;
            });
        }

        function deleteSucataEntry(id) {
            if (confirm('Excluir esta entrada de sucata?')) {
                data.sucata.entries = data.sucata.entries.filter(e => e.id !== id);
                saveData();
                updateSucataEntriesTable();
            }
        }

        function openImageModal(src, title) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;';
            modal.innerHTML = `
                <div style="text-align:center">
                    <h3 style="color:white;margin-bottom:12px">${title}</h3>
                    <img src="${src}" style="max-height:85vh;max-width:90vw;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.6);">
                    <br><br>
                    <button onclick="this.parentElement.parentElement.remove()" style="padding:10px 24px;background:white;color:black;border-radius:8px;font-weight:600">Fechar</button>
                </div>`;
            document.body.appendChild(modal);
        }

        // Mantenha todas as suas funções originais (dashboard, materials, entry, exit, return, stock, history, historypep, etc.)
        // Apenas certifique-se de chamar saveData() após qualquer alteração em 'data'

        // Exemplo:
        // saveData();  // coloque no final de todas as funções que alteram dados
    </script>
</body>
</html>
