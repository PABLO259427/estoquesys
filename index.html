<script>
// ==========================================
// DADOS DO SISTEMA
// ==========================================
let dados = {
    materiais: [],
    peps: [],
    movimentacoes: [],
    entradasFornecedor: [],
    entradasDevolucao: [],
    saidas: []
};

// Variáveis temporárias para formulários
let tempItens = {
    fornecedor: [],
    devolucao: [],
    saida: []
};

let movimentacaoAtual = null;

// ==========================================
// PERSISTÊNCIA COM LOCALSTORAGE
// ==========================================
const STORAGE_KEY = 'EstoqueSysDados_v1';

function carregarDadosSalvos() {
    const salvo = localStorage.getItem(STORAGE_KEY);
    if (salvo) {
        try {
            const parsed = JSON.parse(salvo);
            // Garantir que as estruturas existam mesmo se o JSON estiver incompleto
            dados.materiais = Array.isArray(parsed.materiais) ? parsed.materiais : [];
            dados.peps = Array.isArray(parsed.peps) ? parsed.peps : [];
            dados.movimentacoes = Array.isArray(parsed.movimentacoes) ? parsed.movimentacoes : [];
            dados.entradasFornecedor = Array.isArray(parsed.entradasFornecedor) ? parsed.entradasFornecedor : [];
            dados.entradasDevolucao = Array.isArray(parsed.entradasDevolucao) ? parsed.entradasDevolucao : [];
            dados.saidas = Array.isArray(parsed.saidas) ? parsed.saidas : [];
            console.log('Dados carregados do localStorage com sucesso');
        } catch (e) {
            console.error('Erro ao carregar dados salvos:', e);
            showAlert('Erro ao carregar dados salvos. Iniciando com estoque vazio.', 'warning');
        }
    }
}

function salvarDados() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
        console.log('Dados salvos no localStorage');
    } catch (e) {
        console.error('Erro ao salvar dados:', e);
        if (e.name === 'QuotaExceededError') {
            showAlert('Limite de armazenamento do navegador atingido! Tente limpar dados antigos ou usar outro navegador.', 'danger');
        }
    }
}

// ==========================================
// INICIALIZAÇÃO
// ==========================================
document.addEventListener('DOMContentLoaded', function() {
    // 1. Carregar dados salvos PRIMEIRO
    carregarDadosSalvos();

    // 2. Definir data atual nos campos
    const agora = new Date();
    const dataLocal = agora.toISOString().slice(0, 16);
    
    ['entFornData', 'entDevData', 'saidaData'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = dataLocal;
    });

    // 3. Data no header
    document.getElementById('currentDate').textContent = agora.toLocaleDateString('pt-BR', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // 4. Atualizar toda a interface com os dados carregados
    atualizarTudo();
});

// ==========================================
// ... (mantenha todas as suas funções existentes abaixo: showSection, showAlert, atualizarDashboard, etc.)
// ==========================================

// Agora vamos adicionar salvarDados() no final de TODAS as funções que alteram 'dados'

// MATERIAIS
function salvarMaterial(event) {
    event.preventDefault();
    
    const codigo = document.getElementById('matCodigo').value.trim().toUpperCase();
    if (dados.materiais.some(m => m.codigo === codigo)) {
        showAlert('Já existe um material com este código!', 'danger');
        return;
    }
    
    const material = {
        id: Date.now(),
        codigo: codigo,
        descricao: document.getElementById('matDescricao').value,
        unidade: document.getElementById('matUnidade').value,
        saldo: parseFloat(document.getElementById('matSaldo').value) || 0,
        custo: parseFloat(document.getElementById('matCusto').value) || 0,
        localizacao: document.getElementById('matLocalizacao').value
    };
    
    dados.materiais.push(material);
    atualizarListaMateriais();
    atualizarEstoque();
    atualizarDashboard();
    salvarDados();  // ← SALVA AQUI
    document.getElementById('formMaterial').reset();
    showAlert('Material cadastrado com sucesso!');
}

function excluirMaterial(id) {
    if (!confirm('Tem certeza que deseja excluir este material permanentemente?')) return;
    
    dados.materiais = dados.materiais.filter(m => m.id !== id);
    atualizarListaMateriais();
    atualizarEstoque();
    atualizarDashboard();
    salvarDados();  // ← SALVA AQUI
    showAlert('Material excluído com sucesso!');
}

function atualizarTudo() {

</script>
