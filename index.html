<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste LocalStorage - EstoqueSys</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; max-width: 600px; margin: auto; }
        button { padding: 12px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
        #status { margin: 20px 0; padding: 15px; border-radius: 8px; background: #f0f0f0; }
        pre { background: #eee; padding: 15px; overflow: auto; max-height: 300px; }
    </style>
</head>
<body>
    <h1>Teste de Salvamento (LocalStorage)</h1>
    <p>Objetivo: ver se salva e carrega ao fechar/reabrir o navegador</p>

    <div>
        <input type="text" id="novoItem" placeholder="Digite algo (ex: MAT-TESTE)" style="padding: 10px; width: 300px;">
        <button onclick="adicionarE salvar()">Adicionar + Salvar</button>
    </div>

    <button onclick="mostrarDados()">Mostrar dados atuais</button>
    <button onclick="forcarSalvar()">Forçar salvamento agora</button>
    <button onclick="limparTudo()">Limpar localStorage e recarregar</button>

    <div id="status">Status: aguardando ação...</div>
    <pre id="saida"></pre>

    <script>
        let listaTeste = [];

        const CHAVE = 'TesteEstoqueSys_Pablo_v2026';

        function carregar() {
            const salvo = localStorage.getItem(CHAVE);
            if (salvo) {
                try {
                    listaTeste = JSON.parse(salvo);
                    atualizarStatus(`Carregado ${listaTeste.length} item(s)`);
                } catch (e) {
                    atualizarStatus('Erro ao carregar: ' + e.message, 'erro');
                }
            } else {
                atualizarStatus('Nenhum dado salvo ainda');
            }
            mostrarDados();
        }

        function salvar() {
            try {
                localStorage.setItem(CHAVE, JSON.stringify(listaTeste));
                atualizarStatus(`Salvo com sucesso! (${listaTeste.length} itens)`);
            } catch (e) {
                atualizarStatus('ERRO ao salvar: ' + e.message + ' — Veja console F12', 'erro');
                console.error(e);
            }
        }

        function adicionarE salvar() {
            const valor = document.getElementById('novoItem').value.trim();
            if (!valor) {
                alert('Digite algo!');
                return;
            }
            listaTeste.push({ id: Date.now(), texto: valor, data: new Date().toLocaleString() });
            document.getElementById('novoItem').value = '';
            salvar();
            mostrarDados();
        }

        function mostrarDados() {
            const pre = document.getElementById('saida');
            pre.textContent = JSON.stringify(listaTeste, null, 2) || '[] (vazio)';
        }

        function forcarSalvar() {
            salvar();
        }

        function limparTudo() {
            if (confirm('Limpar tudo mesmo?')) {
                localStorage.removeItem(CHAVE);
                listaTeste = [];
                location.reload();
            }
        }

        function atualizarStatus(msg, tipo = 'normal') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.background = tipo === 'erro' ? '#ffebee' : '#e8f5e9';
            el.style.color = tipo === 'erro' ? '#c62828' : '#2e7d32';
        }

        // Inicia carregando
        carregar();
    </script>
</body>
</html>
