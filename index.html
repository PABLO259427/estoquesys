<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Logistics | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        .dark-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="dark-glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
                <i class="fas fa-microchip text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter uppercase">SmartLog <span class="text-blue-500 text-xs">v2.6</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Command Center</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="notificationBell" class="relative cursor-pointer transition-colors">
                <i class="fas fa-bell text-slate-400 hover:text-white"></i>
                <span id="alertCount" class="hidden absolute -top-2 -right-2 bg-rose-600 text-[9px] px-1.5 py-0.5 rounded-full border-2 border-[#0f172a]">!</span>
            </div>
            <button onclick="exportToExcel()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2">
                <i class="fas fa-file-export"></i> RELATÓRIO
            </button>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto p-6 grid grid-cols-12 gap-8">
        
        <aside class="col-span-12 lg:col-span-3 space-y-6">
            <div class="dark-glass rounded-2xl p-6 space-y-4">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Cap. Imobilizado</p>
                    <p id="totalValue" class="text-2xl font-black text-white">R$ 0,00</p>
                </div>
                <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                    <div>
                        <p class="text-[9px] text-slate-400 uppercase">Projetos/PEPs</p>
                        <p id="activePEPs" class="text-lg font-bold">0</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-400 uppercase">Itens Cadastrados</p>
                        <p id="totalMaterials" class="text-lg font-bold">0</p>
                    </div>
                </div>
            </div>

            <div class="dark-glass rounded-2xl p-6">
                <h3 class="text-xs font-black text-blue-500 uppercase mb-4 tracking-widest">Painel de Saída</h3>
                <form id="exitForm" onsubmit="App.validateExit(event)" class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Material</label>
                        <select id="exitMaterial" onchange="App.updateExitPreview(this.value)" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            <option value="">Selecione...</option>
                        </select>
                    </div>

                    <div id="materialPreview"></div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Quantidade</label>
                            <input type="number" id="exitQuantity" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Destino/PEP</label>
                            <input type="text" id="exitPepSearch" placeholder="Ex: PEP-001" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm outline-none">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-xs py-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all uppercase tracking-widest">
                        Confirmar Movimentação
                    </button>
                </form>
            </div>
        </aside>

        <main class="col-span-12 lg:col-span-9 space-y-8">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="dark-glass rounded-3xl p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-black uppercase tracking-wider">Investimento por PEP</h3>
                        <i class="fas fa-chart-pie text-blue-500"></i>
                    </div>
                    <div class="h-[250px]">
                        <canvas id="pepDonutChart"></canvas>
                    </div>
                </div>

                <div class="dark-glass rounded-3xl p-8 text-slate-800">
                    <h3 class="text-sm font-black text-white uppercase tracking-wider mb-6">Top Materiais Consumidos</h3>
                    <div id="topMaterialsList" class="space-y-4">
                        </div>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-6 px-2">
                    <h3 class="text-sm font-black uppercase tracking-widest">Estoque Físico</h3>
                    <input type="text" placeholder="Filtrar materiais..." class="bg-slate-800 border border-slate-700 rounded-full px-4 py-1.5 text-xs outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div id="stockGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    </div>
            </div>

            <div class="dark-glass rounded-3xl overflow-hidden">
                <div class="p-6 border-b border-white/5 flex justify-between items-center">
                    <h3 class="text-sm font-black uppercase tracking-widest">Log de Auditoria</h3>
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full font-bold">ÚLTIMOS 30 DIAS</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="text-slate-500 uppercase font-black">
                                <th class="p-5">Data/Hora</th>
                                <th class="p-5">Tipo</th>
                                <th class="p-5">Material</th>
                                <th class="p-5 text-center">Qtd</th>
                                <th class="p-5">Origem/Destino</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3"></div>

    <script>
        // --- DATA ENGINE ---
        const App = {
            materials: JSON.parse(localStorage.getItem('materials')) || [
                { id: 1, code: 'P01', description: 'Poste Concreto 11/300', stock: 15, unit: 'UN', unitValue: 1250.00, photo: 'https://cdn-icons-png.flaticon.com/512/3222/3222683.png' },
                { id: 2, code: 'C05', description: 'Cabo Alumínio 4AWG', stock: 200, unit: 'MT', unitValue: 8.50, photo: 'https://cdn-icons-png.flaticon.com/512/2921/2921931.png' }
            ],
            movements: JSON.parse(localStorage.getItem('movements')) || [],

            // --- RENDERIZADORES ---
            renderAll() {
                this.updateSelectors();
                this.renderDashboard();
                this.renderStockGrid();
                this.renderHistoryTable();
                this.updateCharts();
                this.save();
            },

            updateSelectors() {
                const select = document.getElementById('exitMaterial');
                select.innerHTML = '<option value="">Selecione...</option>' + 
                    this.materials.map(m => `<option value="${m.id}">${m.description} (${m.stock})</option>`).join('');
            },

            renderDashboard() {
                const totalVal = this.materials.reduce((acc, m) => acc + (m.stock * m.unitValue), 0);
                const peps = [...new Set(this.movements.map(m => m.origin))].length;

                document.getElementById('totalValue').innerText = `R$ ${totalVal.toLocaleString('pt-BR')}`;
                document.getElementById('activePEPs').innerText = peps;
                document.getElementById('totalMaterials').innerText = this.materials.length;

                // Alertas de Estoque Crítico
                const critical = this.materials.filter(m => m.stock <= 5);
                const bell = document.getElementById('notificationBell');
                const badge = document.getElementById('alertCount');
                
                if(critical.length > 0) {
                    bell.classList.add('text-rose-500', 'animate-bounce');
                    badge.innerText = critical.length;
                    badge.classList.remove('hidden');
                } else {
                    bell.classList.remove('text-rose-500', 'animate-bounce');
                    badge.classList.add('hidden');
                }
            },

            renderStockGrid() {
                const grid = document.getElementById('stockGrid');
                grid.innerHTML = this.materials.map(m => {
                    const isLow = m.stock <= 5;
                    return `
                    <div class="dark-glass p-5 rounded-2xl card-hover border-t-4 ${isLow ? 'border-rose-500' : 'border-blue-500'}">
                        <div class="flex justify-between items-start mb-4">
                            <img src="${m.photo}" class="w-10 h-10 object-contain bg-white/10 rounded p-1">
                            <span class="text-[10px] font-black bg-white/5 px-2 py-1 rounded text-slate-400">${m.code}</span>
                        </div>
                        <h4 class="text-sm font-bold text-white mb-1">${m.description}</h4>
                        <div class="flex items-end justify-between">
                            <div>
                                <p class="text-[9px] text-slate-500 uppercase">Saldo</p>
                                <p class="text-2xl font-black ${isLow ? 'text-rose-400' : 'text-blue-400'}">${m.stock} <span class="text-xs font-normal">${m.unit}</span></p>
                            </div>
                            <p class="text-[10px] font-mono text-slate-500">R$ ${(m.stock * m.unitValue).toLocaleString()}</p>
                        </div>
                    </div>
                `}).join('');
            },

            renderHistoryTable() {
                const table = document.getElementById('historyTable');
                table.innerHTML = this.movements.slice(0, 10).map(m => `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-5 text-slate-400 font-mono">${m.date}</td>
                        <td class="p-5">
                            <span class="px-2 py-0.5 rounded text-[9px] font-black ${m.type === 'ENTRADA' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}">
                                ${m.type}
                            </span>
                        </td>
                        <td class="p-5 font-bold text-slate-300">${m.materialName}</td>
                        <td class="p-5 text-center font-black">${m.qty}</td>
                        <td class="p-5 text-blue-400 font-bold tracking-tighter">${m.origin || '-'}</td>
                    </tr>
                `).join('');
            },

            // --- LÓGICA DE NEGÓCIO ---
            updateExitPreview(id) {
                const div = document.getElementById('materialPreview');
                const mat = this.materials.find(m => m.id == id);
                if(!mat) { div.innerHTML = ''; return; }

                div.innerHTML = `
                    <div class="flex items-center gap-3 p-3 bg-blue-600/10 border border-blue-500/30 rounded-xl animate-fade-in">
                        <img src="${mat.photo}" class="w-10 h-10 rounded bg-white p-1">
                        <div>
                            <p class="text-xs font-bold text-blue-400">${mat.description}</p>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">Estoque Atual: <b>${mat.stock} ${mat.unit}</b></p>
                        </div>
                    </div>
                `;
            },

            validateExit(e) {
                e.preventDefault();
                const id = document.getElementById('exitMaterial').value;
                const qty = parseFloat(document.getElementById('exitQuantity').value);
                const pep = document.getElementById('exitPepSearch').value;
                const material = this.materials.find(m => m.id == id);

                if(!material || !qty || !pep) return showToast("Preencha todos os campos!", "error");

                if(qty > material.stock) {
                    document.getElementById('exitQuantity').classList.add('animate-shake', 'border-rose-500');
                    setTimeout(() => document.getElementById('exitQuantity').classList.remove('animate-shake', 'border-rose-500'), 500);
                    return showToast("Saldo insuficiente no estoque!", "error");
                }

                // Executa Saída
                material.stock -= qty;
                this.movements.unshift({
                    date: new Date().toLocaleString(),
                    type: 'SAÍDA',
                    materialName: material.description,
                    qty: qty,
                    origin: pep,
                    valUnit: material.unitValue
                });

                showToast(`Saída confirmada para o ${pep}!`);
                e.target.reset();
                document.getElementById('materialPreview').innerHTML = '';
                this.renderAll();
            },

            updateCharts() {
                const pepMap = this.movements
                    .filter(m => m.type === 'SAÍDA')
                    .reduce((acc, m) => {
                        acc[m.origin] = (acc[m.origin] || 0) + (m.qty * m.valUnit);
                        return acc;
                    }, {});

                const ctx = document.getElementById('pepDonutChart').getContext('2d');
                if (window.myChart) window.myChart.destroy();
                
                window.myChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(pepMap),
                        datasets: [{
                            data: Object.values(pepMap),
                            backgroundColor: ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#f43f5e'],
                            hoverOffset: 15, borderWeight: 0
                        }]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }
                    }
                });

                // Top Materials Ranking
                const matMap = this.movements
                    .filter(m => m.type === 'SAÍDA')
                    .reduce((acc, m) => {
                        acc[m.materialName] = (acc[m.materialName] || 0) + (m.qty * m.valUnit);
                        return acc;
                    }, {});

                const topList = Object.entries(matMap).sort((a,b) => b[1]-a[1]).slice(0, 3);
                document.getElementById('topMaterialsList').innerHTML = topList.map(([name, val]) => `
                    <div class="flex items-center justify-between p-3 bg-white rounded-xl shadow-sm border border-gray-100">
                        <span class="text-xs font-bold text-slate-600 truncate mr-2">${name}</span>
                        <span class="text-xs font-black text-blue-600 font-mono">R$ ${val.toLocaleString()}</span>
                    </div>
                `).join('') || '<p class="text-[10px] text-center text-slate-500 py-4 uppercase font-bold">Sem dados de saída</p>';
            },

            save() {
                localStorage.setItem('materials', JSON.stringify(this.materials));
                localStorage.setItem('movements', JSON.stringify(this.movements));
            }
        };

        function showToast(msg, type = 'success') {
            const cont = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl text-white text-xs font-black shadow-2xl animate-fade-in flex items-center gap-3 ${type === 'success' ? 'bg-blue-600' : 'bg-rose-600'}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check' : 'fa-exclamation'}"></i> ${msg}`;
            cont.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function exportToExcel() {
            showToast("Gerando relatório CSV...");
            let csv = "Data;Tipo;Material;Qtd;Destino;Valor\n";
            App.movements.forEach(m => {
                csv += `${m.date};${m.type};${m.materialName};${m.qty};${m.origin};${(m.qty*m.valUnit).toFixed(2)}\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `LOG_AUDITORIA_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        window.onload = () => App.renderAll();
    </script>
</body>
</html>
